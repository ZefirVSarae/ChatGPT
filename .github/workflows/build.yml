name: Build Gemini Desktop EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tkinterweb pillow requests pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --icon=icon.ico --name "GeminiDesktop" main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GeminiDesktop-Executable
        path: dist/GeminiDesktop.exe
        
